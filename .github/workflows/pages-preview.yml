name: Deploy PR Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  pull-requests: write

jobs:
  deploy-preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: pnpm install --frozen-lockfile

      - name: Build preview bundle
        if: github.event.action != 'closed'
        env:
          BASE_PATH: /${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.number }}/
        run: pnpm build:pages

      - name: Deploy or remove PR preview
        id: preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./apps/web/dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          wait-for-pages-deployment: false

      - name: Trigger GitHub Pages build
        if: steps.preview.outputs.deployment-action != 'none'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api -X POST repos/${{ github.repository }}/pages/builds
