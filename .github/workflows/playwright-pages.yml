name: Playwright Pages Smoke

on:
  workflow_run:
    workflows:
      - Deploy Pages
    types:
      - completed
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  smoke:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run smoke tests against GitHub Pages
        env:
          PLAYWRIGHT_BASE_URL: https://jakubzitny.github.io/codex_test_snake/
        run: pnpm test:e2e:pages

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-pages-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-pages-results
          path: test-results
          if-no-files-found: ignore
