name: Dependabot Auto-merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, labeled]

permissions:
  pull-requests: write

jobs:
  enable-automerge:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for safe Dependabot PRs
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;

            if (pr.draft) {
              core.info('PR is draft, skipping for now.');
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const touchesWorkflow = files.some(f => f.filename.startsWith('.github/workflows/'));
            if (touchesWorkflow) {
              core.info('PR touches workflow files -> keep manual review/merge.');
              return;
            }

            const mutation = `
              mutation($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId, mergeMethod: SQUASH }) {
                  pullRequest { number autoMergeRequest { enabledAt } }
                }
              }
            `;

            try {
              await github.graphql(mutation, { pullRequestId: pr.node_id });
              core.info(`Auto-merge enabled for PR #${pr.number}`);
            } catch (error) {
              core.warning(`Could not enable auto-merge for PR #${pr.number}: ${error.message}`);
            }
